<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FIT.ITC.PC</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700&display=swap');
:root{
  --bg:#0d0d0d;--surf:#181818;--surf2:#202020;--surf3:#2a2a2a;
  --b1:#252525;--b2:#333;--b3:#444;
  --t1:#ececec;--t2:#888;--t3:#444;
  --acc:#c8f000;--acc2:#00d4aa;--err:#ff5555;--warn:#ffaa33;
  --pc-bg:#0f1f0f;--pc-bd:#2e6e2e;--pc-t:#6ec96e;
  --hi-today:rgba(200,240,0,0.22);--hi-today-bd:#c8f000;
  --hi-ok:rgba(0,212,170,0.18);--hi-ok-bd:#00d4aa;
  --hi-ng:rgba(255,85,85,0.22);--hi-ng-bd:#ff5555;
  --hi-warn:rgba(255,170,51,0.22);--hi-warn-bd:#ffaa33;
  --nav-h:58px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--t1);font-family:'DM Mono',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* LOGIN */
#loginScreen{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:var(--bg)}
#loginScreen.hidden{display:none}
.login-box{width:calc(100vw - 40px);max-width:360px;padding:36px 24px;background:var(--surf);border:1px solid var(--b2);border-radius:12px}
.login-logo{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:10px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:28px}
.login-field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.login-label{font-size:10px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase}
.login-input{background:var(--surf2);border:1px solid var(--b2);border-radius:6px;color:var(--t1);font-family:'DM Mono',monospace;font-size:16px;padding:12px 14px;outline:none;width:100%}
.login-input:focus{border-color:var(--acc)}
.login-btn{width:100%;padding:14px;background:#2563eb;border:none;border-radius:6px;color:#fff;font-family:'DM Mono',monospace;font-size:14px;font-weight:500;cursor:pointer;margin-top:6px}
.login-err{font-size:11px;color:var(--err);text-align:center;margin-top:8px;min-height:15px}

/* HEADER */
.header{display:flex;align-items:center;height:50px;background:var(--surf);border-bottom:1px solid var(--b1);padding:0 14px;gap:10px;flex-shrink:0}
.header-logo{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;flex-shrink:0}
.room-scroll{flex:1;overflow-x:auto;white-space:nowrap;scrollbar-width:none}
.room-scroll::-webkit-scrollbar{display:none}
.room-chip{display:inline-block;padding:5px 11px;border:1px solid var(--b2);border-radius:20px;font-size:11px;color:var(--t2);cursor:pointer;margin-right:4px;background:transparent;font-family:'DM Mono',monospace}
.room-chip.on{background:var(--acc);border-color:var(--acc);color:#000;font-weight:500}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--t3);flex-shrink:0}
.sync-dot.ok{background:var(--acc2)}
.sync-dot.saving{background:var(--warn);animation:blink .7s infinite}
.sync-dot.err{background:var(--err)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* CANVAS PAGE */
#canvasPage{flex:1;overflow:hidden;display:flex;flex-direction:column;position:relative}

/* Today info bar - collapsible */
.info-bar{background:var(--surf);border-bottom:1px solid var(--b1);overflow:hidden;transition:max-height .25s;max-height:120px;flex-shrink:0}
.info-bar.collapsed{max-height:0}
.info-inner{padding:10px 14px;display:flex;align-items:center;gap:10px}
.info-grp{flex:1;min-width:0}
.info-grp-name{font-size:14px;font-weight:500;color:var(--acc)}
.info-grp-sub{font-size:10px;color:var(--t2);margin-top:1px}
.info-progress{text-align:right;flex-shrink:0}
.progress-circle{width:44px;height:44px;position:relative}
.progress-circle svg{transform:rotate(-90deg)}
.progress-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:var(--acc)}

/* Toggle bar */
.toggle-bar{display:flex;align-items:center;justify-content:space-between;padding:5px 14px;background:var(--surf2);border-bottom:1px solid var(--b1);flex-shrink:0;cursor:pointer}
.toggle-bar-left{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--t2)}
.toggle-bar-badges{display:flex;gap:5px}
.tbadge{font-size:9px;padding:2px 7px;border-radius:3px;font-weight:500}
.tbadge.ok{background:var(--hi-ok);color:var(--acc2)}
.tbadge.ng{background:var(--hi-ng);color:var(--err)}
.tbadge.warn{background:var(--hi-warn);color:var(--warn)}
.toggle-arrow{font-size:10px;color:var(--t3);transition:transform .2s}
.toggle-arrow.open{transform:rotate(180deg)}

/* Canvas */
.canvas-wrap{flex:1;overflow:auto;position:relative;
  background:linear-gradient(var(--b1) 1px,transparent 1px),linear-gradient(90deg,var(--b1) 1px,transparent 1px);
  background-size:20px 20px;background-position:-1px -1px}
#canvas{position:relative}

/* Devices */
.dev{position:absolute;border-radius:3px;display:flex;align-items:center;justify-content:center;border:1px solid;overflow:hidden;transition:outline .1s}
.dev.today{outline:2px solid var(--hi-today-bd)}
.dev.today::after{content:'';position:absolute;inset:0;background:var(--hi-today);pointer-events:none;border-radius:2px}
.dev.st-ok{outline:2px solid var(--hi-ok-bd)}
.dev.st-ok::after{content:'';position:absolute;inset:0;background:var(--hi-ok);pointer-events:none;border-radius:2px}
.dev.st-ng{outline:2px solid var(--hi-ng-bd)}
.dev.st-ng::after{content:'';position:absolute;inset:0;background:var(--hi-ng);pointer-events:none;border-radius:2px}
.dev.st-warn{outline:2px solid var(--hi-warn-bd)}
.dev.st-warn::after{content:'';position:absolute;inset:0;background:var(--hi-warn);pointer-events:none;border-radius:2px}
.dev.today{cursor:pointer}
.dev-label{font-size:7px;color:inherit;text-align:center;word-break:break-all;line-height:1.2;pointer-events:none;padding:1px}

/* All-ok button */
.allok-btn{position:absolute;bottom:14px;right:14px;z-index:100;padding:10px 18px;background:var(--hi-ok);border:1px solid var(--hi-ok-bd);border-radius:24px;color:var(--acc2);font-family:'DM Mono',monospace;font-size:13px;font-weight:500;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.4)}

/* HIST PAGE */
#histPage{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;display:none}
.hist-card{background:var(--surf);border:1px solid var(--b1);border-radius:10px;overflow:hidden}
.hist-card-header{padding:12px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--b1)}
.hist-card-date{font-size:12px;font-weight:500}
.hist-card-grp{font-size:11px;color:var(--t2);flex:1}
.hist-badges{display:flex;gap:4px}
.hbadge{font-size:10px;padding:2px 7px;border-radius:3px;font-weight:500}
.hbadge.ok{background:var(--hi-ok);color:var(--acc2)}
.hbadge.ng{background:var(--hi-ng);color:var(--err)}
.hbadge.warn{background:var(--hi-warn);color:var(--warn)}
.hist-dev{padding:9px 14px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:8px}
.hist-dev:last-child{border-bottom:none}
.hist-dev-lbl{flex:1;font-size:12px}
.hist-dev-note{font-size:10px;color:var(--t3);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist-dev-st{font-size:10px;padding:3px 8px;border-radius:3px;border:1px solid;flex-shrink:0}
.hist-dev-st.ok{background:var(--hi-ok);border-color:var(--hi-ok-bd);color:var(--acc2)}
.hist-dev-st.ng{background:var(--hi-ng);border-color:var(--hi-ng-bd);color:var(--err)}
.hist-dev-st.warn{background:var(--hi-warn);border-color:var(--hi-warn-bd);color:var(--warn)}
.res-btn{font-size:9px;padding:3px 8px;border-radius:3px;border:1px solid var(--acc2);color:var(--acc2);background:transparent;font-family:'DM Mono',monospace;cursor:pointer;flex-shrink:0}
.res-btn.done{border-color:var(--b2);color:var(--t3)}

/* BOTTOM SHEET */
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:400;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s}
.sheet-bg.open{opacity:1;pointer-events:all}
.sheet{background:var(--surf);border-radius:16px 16px 0 0;padding:18px 18px calc(env(safe-area-inset-bottom)+28px);width:100%;transform:translateY(100%);transition:transform .25s;max-height:80vh;overflow-y:auto}
.sheet-bg.open .sheet{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--b2);border-radius:2px;margin:0 auto 14px}
.sheet-title{font-size:16px;font-weight:500;margin-bottom:3px}
.sheet-sub{font-size:11px;color:var(--t2);margin-bottom:16px}
.sheet-btns{display:flex;flex-direction:column;gap:8px}
.sheet-btn{padding:15px;border-radius:10px;border:1px solid;font-family:'DM Mono',monospace;font-size:14px;font-weight:500;cursor:pointer;text-align:center}
.s-ok{background:var(--hi-ok);border-color:var(--hi-ok-bd);color:var(--acc2)}
.s-warn{background:var(--hi-warn);border-color:var(--hi-warn-bd);color:var(--warn)}
.s-ng{background:var(--hi-ng);border-color:var(--hi-ng-bd);color:var(--err)}
.s-reset{background:var(--surf2);border-color:var(--b2);color:var(--t2)}
.sheet-note{width:100%;margin-top:8px;background:var(--surf2);border:1px solid var(--b1);border-radius:8px;color:var(--t1);font-family:'DM Mono',monospace;font-size:14px;padding:11px 13px;resize:none;outline:none;min-height:68px}
.sheet-note:focus{border-color:var(--acc)}

/* NAV */
.bottom-nav{display:flex;height:var(--nav-h);background:var(--surf);border-top:1px solid var(--b1);flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;color:var(--t2);font-family:'DM Mono',monospace;font-size:9px;cursor:pointer;position:relative}
.nav-btn.on{color:var(--acc)}
.nav-btn.on::after{content:'';position:absolute;top:0;left:22%;right:22%;height:2px;background:var(--acc);border-radius:0 0 2px 2px}
.nav-icon{font-size:21px;line-height:1}

/* TOAST */
#toast{position:fixed;bottom:calc(var(--nav-h)+12px);left:50%;transform:translateX(-50%) translateY(8px);background:var(--acc);color:#000;font-size:12px;font-family:'DM Mono',monospace;padding:7px 16px;border-radius:6px;opacity:0;pointer-events:none;transition:opacity .18s,transform .18s;white-space:nowrap;z-index:9000}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo"><span style="color:#4a9eff">FIT</span><span style="color:var(--t3)">.</span><span style="color:#a0c8ff">ITC</span><span style="color:var(--t3)">.</span><span style="color:#e0eeff">PC</span></div>
    <div class="login-sub">教室設備管理システム</div>
    <div class="login-field"><div class="login-label">ユーザー名</div>
      <input class="login-input" id="loginUser" type="text" placeholder="FIT.ITC.PC" autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="login-field"><div class="login-label">パスワード</div>
      <input class="login-input" id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-logo"><span style="color:#4a9eff">FIT</span><span style="color:var(--t3)">.</span><span style="color:#a0c8ff">ITC</span><span style="color:var(--t3)">.</span><span style="color:#e0eeff">PC</span></div>
  <div class="room-scroll" id="roomBar"></div>
  <div class="sync-dot" id="syncDot"></div>
</div>

<!-- CANVAS PAGE -->
<div id="canvasPage" style="display:flex">
  <!-- collapsible info bar -->
  <div class="info-bar" id="infoBar">
    <div class="info-inner">
      <div class="info-grp">
        <div class="info-grp-name" id="grpName">—</div>
        <div class="info-grp-sub" id="grpSub">今日の検査グループ</div>
      </div>
      <div class="info-progress">
        <div class="progress-circle">
          <svg width="44" height="44" viewBox="0 0 44 44">
            <circle cx="22" cy="22" r="17" fill="none" stroke="var(--b2)" stroke-width="4"/>
            <circle id="progressRing" cx="22" cy="22" r="17" fill="none" stroke="var(--acc)" stroke-width="4"
              stroke-dasharray="106.8" stroke-dashoffset="106.8" stroke-linecap="round"/>
          </svg>
          <div class="progress-pct" id="progressPct">0%</div>
        </div>
      </div>
    </div>
  </div>
  <!-- toggle bar -->
  <div class="toggle-bar" id="toggleBar" onclick="toggleInfoBar()">
    <div class="toggle-bar-left">
      <span id="toggleBarText">詳細を隠す</span>
      <div class="toggle-bar-badges" id="toggleBadges"></div>
    </div>
    <span class="toggle-arrow open" id="toggleArrow">▲</span>
  </div>
  <!-- canvas -->
  <div class="canvas-wrap" id="cWrap">
    <div id="canvas"></div>
  </div>
  <!-- all ok button -->
  <button class="allok-btn" id="allOkBtn" onclick="markAllOk()">✓ 全て正常</button>
</div>

<!-- HIST PAGE -->
<div id="histPage"></div>

<!-- BOTTOM SHEET -->
<div class="sheet-bg" id="sheetBg" onclick="closeSheet(event)">
  <div class="sheet" id="sheet"></div>
</div>

<!-- NAV -->
<div class="bottom-nav">
  <button class="nav-btn on" id="nav-check" onclick="showPage('check')">
    <span class="nav-icon">✅</span>本日の検査</button>
  <button class="nav-btn" id="nav-hist" onclick="showPage('hist')">
    <span class="nav-icon">📋</span>履歴</button>
</div>

<div id="toast"></div>

<script>
const CREDS={user:'FIT.ITC.PC',pass:'FIT.ITC.2887'};
let rooms={},groups={},checkData={},curRoom='',curPage='check',infoBarOpen=true;
let popDevId=null;

const today=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;};
const fmtDate=s=>s.replace(/-/g,'/');
const wd=['日','月','火','水','木','金','土'];

function getGrps(){return groups[curRoom]||[];}
function getTodayGrp(){
  const grps=getGrps();if(!grps.length)return null;
  const d=new Date();const dow=d.getDay();if(dow===0)return null;
  const epoch=new Date(2024,0,1);
  const cur=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  const diff=Math.floor((cur-epoch)/86400000);
  const weeks=Math.floor(diff/7);const rem=diff%7;
  const idx=(weeks*6+(rem<6?rem:5))%grps.length;
  return grps[idx];
}
function getStatus(devId){
  const grp=getTodayGrp();if(!grp)return null;
  return checkData[today()]?.[curRoom]?.[grp.id]?.[devId]?.status||null;
}

// ── SYNC ──
function setSyncDot(s){const el=document.getElementById('syncDot');if(el)el.className='sync-dot '+s;}
async function loadAll(){
  try{
    const ctrl=new AbortController();
    setTimeout(()=>ctrl.abort(),5000);
    const r=await fetch('/api/data',{signal:ctrl.signal});
    if(r.ok){
      const d=await r.json();
      // Always trust server - it is the source of truth
      rooms=d.rooms||{};
      groups=d.groups||{};
      checkData=d.checkData||{};
      if(d.roomOrder&&Array.isArray(d.roomOrder)){
        localStorage.setItem('rc_room_order',JSON.stringify(d.roomOrder));
      }
      setSyncDot('ok');
      return;
    }
  }catch(e){
    console.warn('Server fetch failed, using localStorage fallback',e);
  }
  // Only fall back to localStorage if server is unreachable
  try{const r=localStorage.getItem('rc_rooms');if(r)rooms=JSON.parse(r);}catch(e){}
  try{const g=localStorage.getItem('rc_groups');if(g)groups=JSON.parse(g);}catch(e){}
  try{const cc=localStorage.getItem('rc_checks');if(cc)checkData=JSON.parse(cc);}catch(e){}
  setSyncDot('err');
}
async function saveChecks(){
  localStorage.setItem('rc_checks',JSON.stringify(checkData));
  setSyncDot('saving');
  try{
    const r=await fetch('/api/data',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({rooms,groups,checkData})});
    if(r.ok)setSyncDot('ok');else setSyncDot('err');
  }catch(e){setSyncDot('err');}
}
async function loadTheme(){
  try{const s=localStorage.getItem('rc_theme');if(s){const t=JSON.parse(s);Object.entries(t).forEach(([v,val])=>document.documentElement.style.setProperty(v,val));}}catch(e){}
  try{const ctrl=new AbortController();setTimeout(()=>ctrl.abort(),2000);const r=await fetch('/api/theme',{signal:ctrl.signal});if(r.ok){const d=await r.json();if(d.ok&&d.theme){Object.entries(d.theme).forEach(([v,val])=>document.documentElement.style.setProperty(v,val));}}}catch(e){}
}

// ── LOGIN ──
function doLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value;
  if(u===CREDS.user&&p===CREDS.pass){
    sessionStorage.setItem('rc_auth','1');
    document.getElementById('loginScreen').classList.add('hidden');
  } else {
    document.getElementById('loginErr').textContent='ユーザー名またはパスワードが違います';
    document.getElementById('loginPass').value='';
    const box=document.querySelector('.login-box');
    box.style.transform='translateX(-5px)';setTimeout(()=>{box.style.transform='translateX(5px)';setTimeout(()=>{box.style.transform='';},70);},70);
  }
}

// ── ROOM BAR ──
function getRoomOrder(){
  try{
    const saved=localStorage.getItem('rc_room_order');
    if(saved){
      const arr=JSON.parse(saved);
      const all=Object.keys(rooms);
      const ordered=arr.filter(n=>rooms[n]);
      const extra=all.filter(n=>!ordered.includes(n));
      return [...ordered,...extra];
    }
  }catch(e){}
  return Object.keys(rooms);
}

function buildRoomBar(){
  const bar=document.getElementById('roomBar');bar.innerHTML='';
  Object.keys(rooms).forEach(name=>{
    const b=document.createElement('button');b.className='room-chip'+(name===curRoom?' on':'');
    b.textContent=name;b.onclick=()=>{curRoom=name;buildRoomBar();renderPage();};
    bar.appendChild(b);
  });
}

// ── PAGE SWITCH ──
function showPage(page){
  curPage=page;
  document.getElementById('nav-check').classList.toggle('on',page==='check');
  document.getElementById('nav-hist').classList.toggle('on',page==='hist');
  document.getElementById('canvasPage').style.display=page==='check'?'flex':'none';
  document.getElementById('histPage').style.display=page==='hist'?'flex':'none';
  renderPage();
}
function renderPage(){if(curPage==='check')renderCheck();else renderHist();}

// ── INFO BAR TOGGLE ──
let infoCollapsed=false;
function toggleInfoBar(){
  infoCollapsed=!infoCollapsed;
  document.getElementById('infoBar').classList.toggle('collapsed',infoCollapsed);
  document.getElementById('toggleArrow').classList.toggle('open',!infoCollapsed);
  document.getElementById('toggleBarText').textContent=infoCollapsed?'詳細を表示':'詳細を隠す';
}

// ── CHECK PAGE ──
function renderCheck(){
  const grp=getTodayGrp();
  const todayStr=today();
  const dow=new Date().getDay();

  // Update info bar
  if(dow===0){
    document.getElementById('grpName').textContent='🎌 日曜日';
    document.getElementById('grpSub').textContent='本日は検査がありません';
    document.getElementById('allOkBtn').style.display='none';
  } else if(!grp){
    document.getElementById('grpName').textContent='グループ未設定';
    document.getElementById('grpSub').textContent='PCで列グループを設定してください';
    document.getElementById('allOkBtn').style.display='none';
  } else {
    const total=grp.deviceIds.length;
    const done=grp.deviceIds.filter(id=>getStatus(id)).length;
    const pct=total?Math.round(done/total*100):0;
    document.getElementById('grpName').textContent='📍 '+grp.name;
    document.getElementById('grpSub').textContent=`${done}/${total}台完了`;
    document.getElementById('allOkBtn').style.display='block';
    // Progress ring
    const circ=106.8;
    document.getElementById('progressRing').style.strokeDashoffset=circ*(1-pct/100);
    document.getElementById('progressPct').textContent=pct+'%';
    // Toggle bar badges
    const ok=grp.deviceIds.filter(id=>getStatus(id)==='ok').length;
    const ng=grp.deviceIds.filter(id=>getStatus(id)==='ng').length;
    const wa=grp.deviceIds.filter(id=>getStatus(id)==='warn').length;
    const tb=document.getElementById('toggleBadges');tb.innerHTML='';
    if(ok)tb.innerHTML+=`<span class="tbadge ok">✓${ok}</span>`;
    if(ng)tb.innerHTML+=`<span class="tbadge ng">✗${ng}</span>`;
    if(wa)tb.innerHTML+=`<span class="tbadge warn">△${wa}</span>`;
  }

  // Render canvas
  renderCanvas();
}

function renderCanvas(){
  const cv=document.getElementById('canvas');cv.innerHTML='';
  const devs=rooms[curRoom]||[];
  if(!devs.length){cv.style.width='400px';cv.style.height='300px';return;}
  let mx=0,my=0;
  devs.forEach(d=>{mx=Math.max(mx,d.x+d.w+32);my=Math.max(my,d.y+d.h+32);});
  cv.style.width=mx+'px';cv.style.height=my+'px';

  const grp=getTodayGrp();
  const todayIds=new Set(grp?grp.deviceIds:[]);
  const todayStr=today();

  devs.forEach(d=>{
    const el=document.createElement('div');
    el.className='dev';
    el.style.cssText=`left:${d.x}px;top:${d.y}px;width:${d.w}px;height:${d.h}px;background:${d.bgColor||'#0f1f0f'};border-color:${(d.color||'#6ec96e')}44`;
    const lbl=document.createElement('span');
    lbl.className='dev-label';
    lbl.style.color=d.color||'#6ec96e';
    lbl.style.fontSize=(d.fontSize||7)+'px';
    lbl.style.writingMode=d.vertical?'vertical-rl':'horizontal-tb';
    lbl.textContent=d.label||'';
    el.appendChild(lbl);

    if(todayIds.has(d.id)){
      const st=getStatus(d.id);
      if(st) el.classList.add('st-'+st);
      else el.classList.add('today');
      el.onclick=()=>openSheet(d.id,d);
    }
    cv.appendChild(el);
  });
}

// ── BOTTOM SHEET ──
function openSheet(did,dv){
  popDevId=did;
  const st=getStatus(did);
  const curNote=checkData[today()]?.[curRoom]?.[getTodayGrp()?.id]?.[did]?.note||'';
  const sheet=document.getElementById('sheet');
  sheet.innerHTML=`
    <div class="sheet-handle"></div>
    <div class="sheet-title">${esc(dv.label||dv.id)}</div>
    <div class="sheet-sub">${dv.pc&&dv.monitor?`PC:${dv.pc} / モニター:${dv.monitor}`:''}</div>
    <div class="sheet-btns">
      <button class="sheet-btn s-ok" onclick="doCheck('ok')">✓ 正常</button>
      <button class="sheet-btn s-warn" onclick="doCheck('warn')">△ 要注意</button>
      <button class="sheet-btn s-ng" onclick="doCheck('ng')">✗ 異常あり</button>
      ${st?`<button class="sheet-btn s-reset" onclick="doCheck(null)">リセット</button>`:''}
    </div>
    <textarea class="sheet-note" id="sheetNote" rows="3" placeholder="メモ（任意）">${esc(curNote)}</textarea>
  `;
  document.getElementById('sheetBg').classList.add('open');
}
function closeSheet(e){if(e.target===document.getElementById('sheetBg'))document.getElementById('sheetBg').classList.remove('open');}
function doCheck(status){
  if(!popDevId)return;
  const note=document.getElementById('sheetNote')?.value||'';
  const todayStr=today();const grp=getTodayGrp();if(!grp)return;
  if(!checkData[todayStr])checkData[todayStr]={};
  if(!checkData[todayStr][curRoom])checkData[todayStr][curRoom]={};
  if(!checkData[todayStr][curRoom][grp.id])checkData[todayStr][curRoom][grp.id]={};
  if(status===null)delete checkData[todayStr][curRoom][grp.id][popDevId];
  else checkData[todayStr][curRoom][grp.id][popDevId]={status,note,resolved:false};
  document.getElementById('sheetBg').classList.remove('open');
  saveChecks();renderCheck();
  toast(status==='ok'?'✓ 正常':status==='ng'?'✗ 異常を記録':status==='warn'?'△ 要注意を記録':'リセットしました');
}

function markAllOk(){
  const todayStr=today();const grp=getTodayGrp();
  if(!grp||!grp.deviceIds.length)return;
  if(!confirm('全'+grp.deviceIds.length+'台を「正常」に記録しますか？'))return;
  if(!checkData[todayStr])checkData[todayStr]={};
  if(!checkData[todayStr][curRoom])checkData[todayStr][curRoom]={};
  if(!checkData[todayStr][curRoom][grp.id])checkData[todayStr][curRoom][grp.id]={};
  grp.deviceIds.forEach(id=>{checkData[todayStr][curRoom][grp.id][id]={status:'ok',note:'',resolved:false};});
  saveChecks();renderCheck();toast('✓ 全台を正常に記録しました');
}

// ── HIST PAGE ──
function renderHist(){
  const page=document.getElementById('histPage');page.innerHTML='';
  const dates=Object.keys(checkData).sort().reverse();
  let any=false;
  dates.forEach(dateStr=>{
    const rd=checkData[dateStr];if(!rd)return;
    Object.entries(rd).forEach(([room,gd])=>{
      if(room!==curRoom)return;
      Object.entries(gd).forEach(([grpId,devData])=>{
        any=true;
        const grp=(groups[room]||[]).find(g=>g.id===grpId);
        const vals=Object.values(devData);
        const ok=vals.filter(v=>v.status==='ok').length;
        const ng=vals.filter(v=>v.status==='ng').length;
        const wa=vals.filter(v=>v.status==='warn').length;
        const card=document.createElement('div');card.className='hist-card';
        // Header
        const hdr=document.createElement('div');hdr.className='hist-card-header';
        hdr.innerHTML=`<span class="hist-card-date">${fmtDate(dateStr)}</span>
          <span class="hist-card-grp">${grp?esc(grp.name):grpId}</span>
          <div class="hist-badges">
            ${ok?`<span class="hbadge ok">✓${ok}</span>`:''}
            ${ng?`<span class="hbadge ng">✗${ng}</span>`:''}
            ${wa?`<span class="hbadge warn">△${wa}</span>`:''}
          </div>`;
        card.appendChild(hdr);
        // Problem devices
        Object.entries(devData).filter(([,v])=>v.status==='ng'||v.status==='warn').forEach(([did,{status,note,resolved}])=>{
          const dv=(rooms[room]||[]).find(d=>d.id===did);
          const row=document.createElement('div');row.className='hist-dev';
          row.innerHTML=`<span class="hist-dev-lbl">${esc(dv?dv.label:did)}</span>
            ${note?`<span class="hist-dev-note">${esc(note)}</span>`:''}
            <span class="hist-dev-st ${status}">${status==='ng'?'✗ 異常':'△ 注意'}</span>`;
          const rb=document.createElement('button');
          rb.className='res-btn'+(resolved?' done':'');
          rb.textContent=resolved?'🔧 解決済み':'解決済み';
          rb.onclick=()=>{
            checkData[dateStr][room][grpId][did].resolved=!resolved;
            saveChecks();renderHist();
            toast(resolved?'取り消しました':'🔧 解決済みにしました');
          };
          row.appendChild(rb);card.appendChild(row);
        });
        page.appendChild(card);
      });
    });
  });
  if(!any){const e=document.createElement('div');e.style.cssText='text-align:center;color:var(--t3);padding:40px;font-size:12px';e.textContent='検査履歴がありません';page.appendChild(e);}
}

// ── UTILS ──
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
let tT;function toast(msg){const e=document.getElementById('toast');e.textContent=msg;e.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>e.classList.remove('show'),2000);}

// ── INIT ──
async function init(){
  loadTheme().catch(()=>{});
  if(sessionStorage.getItem('rc_auth')==='1'){document.getElementById('loginScreen').classList.add('hidden');}
  await loadAll();
  const names=getRoomOrder();curRoom=names[0]||'';
  buildRoomBar();showPage('check');
  // Auto-refresh data every 30 seconds
  setInterval(async()=>{
    await loadAll();
    buildRoomBar();renderPage();
  }, 30000);
  // Refresh when page becomes visible again
  document.addEventListener('visibilitychange',async()=>{
    if(!document.hidden){
      await loadAll();
      buildRoomBar();renderPage();
    }
  });
}
init();
</script>
</body>
</html>
